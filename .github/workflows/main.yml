name: Update Baanbezetting

on:
  schedule:
    - cron: "*/2 * * * *" # Elke 2 minuten
  workflow_dispatch:      # Handmatige knop

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Generate HTML
        run: php baanbezetting.php > index.html

      - name: Commit and Push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update baanbezetting $(date)" || echo "Geen wijzigingen"
          git push origin HEAD
