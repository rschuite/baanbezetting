name: Generate Baanbezetting

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check NL time window
        id: timecheck
        run: |
          HOUR=$(TZ=Europe/Amsterdam date +%H)
          if [ $HOUR -lt 7 ] || [ $HOUR -ge 20 ]; then
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        if: steps.timecheck.outputs.run == 'true'

      - uses: shivammathur/setup-php@v2
        if: steps.timecheck.outputs.run == 'true'
        with:
          php-version: 8.2

      - name: Generate HTML
        if: steps.timecheck.outputs.run == 'true'
        run: php baanbezetting.php > index.html

      - name: Commit changes
        if: steps.timecheck.outputs.run == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git commit -m "update" || echo "No changes"
          git push

      - name: Trigger next run (2 min)
        if: steps.timecheck.outputs.run == 'true'
        run: |
          sleep 120
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/baanbezetting.yml/dispatches \
            -d '{"ref":"main"}'
