name: Generate Baanbezetting

permissions:
  contents: write  # Cruciaal voor het kunnen pushen van de nieuwe index.html

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch: # Zodat je handmatig op de knop 'Run workflow' kunt drukken

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nodig om de geschiedenis te kennen voor een push

      - name: Check NL time window
        id: timecheck
        run: |
          HOUR=$(TZ=Europe/Amsterdam date +%H)
          echo "Current hour NL: $HOUR"
          if [ $HOUR -lt 7 ] || [ $HOUR -ge 20 ]; then
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup PHP
        if: steps.timecheck.outputs.run == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Generate HTML
        if: steps.timecheck.outputs.run == 'true'
        run: |
          # We checken eerst of het bestand wel bestaat om de 'Could not open input file' error te voorkomen
          if [ -f "baanbezetting.php" ]; then
            php baanbezetting.php > index.html
          else
            echo "Fout: baanbezetting.php niet gevonden in de root!"
            exit 1
          fi

      - name: Commit and Push changes
        if: steps.timecheck.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          
          # Alleen pushen als er daadwerkelijk iets veranderd is in de HTML
          if git diff --staged --quiet; then
            echo "Geen wijzigingen om te committen."
          else
            git commit -m "Update baanbezetting $(date)"
            git push origin main
          fi
