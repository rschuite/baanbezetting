name: Generate Baanbezetting

permissions:
  contents: write

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Generate HTML
        run: |
          # Verwijder de oude index om verwarring te voorkomen
          rm -f index.html
          # Voer het script uit en dwing output naar index.html
          php baanbezetting.php > index.html
          # Controleer of het bestand echt gemaakt is en niet leeg is
          ls -l index.html

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # We voegen de huidige datum toe aan het commit bericht om de push te forceren
          git commit -m "Update: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin HEAD --force
