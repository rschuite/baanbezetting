name: Generate Baanbezetting

permissions:
  contents: write

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check NL time window
        id: timecheck
        run: |
          HOUR=$(TZ=Europe/Amsterdam date +%H)
          echo "Current hour NL: $HOUR"
          if [ $HOUR -lt 7 ] || [ $HOUR -ge 20 ]; then
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup PHP
        if: steps.timecheck.outputs.run == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Generate HTML
        if: steps.timecheck.outputs.run == 'true'
        run: |
          if [ -f "baanbezetting.php" ]; then
            php baanbezetting.php > index.html
          else
            echo "Bestand baanbezetting.php niet gevonden!"
            exit 1
          fi

      - name: Commit and Push changes
        if: steps.timecheck.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Geen wijzigingen."
          else
            git commit -m "Update baanbezetting $(date)"
            git push origin HEAD
          fi
