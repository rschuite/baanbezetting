name: Update baanbezetting

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch pagina
        run: |
          curl -L "https://andersteinnc.duckdns.org/local/baan/index.html?$(date +%s)" -o index.html

      - name: Commit als gewijzigd
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "update baan"
          git push
